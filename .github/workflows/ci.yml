name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege default; jobs that need more request it explicitly.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11" # Odoo 17/18 runtime

jobs:
  lint:
    name: Lint (ruff + pylint-odoo)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install linters
        run: python -m pip install --no-cache-dir "ruff==0.9.6" "pylint-odoo==9.1.3"

      - name: Ruff (rules)
        run: ruff check --output-format=github ecosphere

      - name: Ruff (formatting)
        run: ruff format --check ecosphere

      # OCA-organization-only checks are disabled (OCA author, README.rst
      # template, deprecated description key). manifest-version-format is
      # disabled until the target Odoo series is pinned — re-enable it once
      # the manifest version is e.g. 18.0.1.0.0.
      - name: pylint-odoo (Odoo-specific checks)
        run: >-
          pylint --load-plugins=pylint_odoo --disable=all --enable=odoolint
          --disable=manifest-required-author,manifest-deprecated-key,manifest-version-format,missing-readme
          ecosphere

  sast:
    name: SAST (bandit)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install bandit
        run: python -m pip install --no-cache-dir "bandit[toml]==1.8.0"

      # -ll fails the build on MEDIUM severity and above.
      - name: Bandit scan
        run: bandit -r ecosphere -ll

  sca:
    name: SCA (trivy + pip-audit)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      # Scans any manifests/lockfiles in the repo for known CVEs and
      # catches secrets accidentally committed to the tree.
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # No requirements file exists yet; this activates automatically
      # the moment one is added.
      - name: pip-audit (requirements files, if any)
        run: |
          python -m pip install --no-cache-dir "pip-audit==2.7.3"
          shopt -s nullglob globstar
          files=(requirements*.txt **/requirements*.txt)
          if [ ${#files[@]} -eq 0 ]; then
            echo "::notice::No requirements*.txt found — skipping pip-audit."
            exit 0
          fi
          args=()
          for f in "${files[@]}"; do args+=(-r "$f"); done
          pip-audit --strict "${args[@]}"

  dependencies-audit:
    name: Dependencies audit (dependency review)
    # The dependency-review API only exists for pull requests.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - name: Dependency review
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
          # MIT project (see LICENSE) — block copyleft creeping in via deps.
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-3.0

  code-quality:
    name: Code quality (radon/xenon)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install tools
        run: python -m pip install --no-cache-dir "radon==6.0.1" "xenon==0.9.3"

      - name: Complexity report (informational)
        run: |
          echo "## Cyclomatic complexity" >> "$GITHUB_STEP_SUMMARY"
          radon cc ecosphere -s -a | tee -a "$GITHUB_STEP_SUMMARY"
          echo "## Maintainability index" >> "$GITHUB_STEP_SUMMARY"
          radon mi ecosphere -s | tee -a "$GITHUB_STEP_SUMMARY"

      # Gate: no block worse than C, module average B, repo average A.
      - name: Complexity gate
        run: xenon --max-absolute C --max-modules B --max-average A ecosphere
